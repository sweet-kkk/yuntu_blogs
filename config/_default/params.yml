########################################
# Basic Configuration
########################################

# 主菜单导航
# 更多图标信息，请访问 https://github.com/D-Sketon/hexo-theme-reimu/issues/30
menu:
  - name: home
    url: ""
    icon: # 默认使用太极图标，你可以使用fontawesome或icon_font的十六进制表示，如'f0c1'
  - name: archives
    url: "archives"
    icon:
  - name: about
    url: "about"
    icon:
  - name: friend
    url: "friend"
    icon:

mainSections: ["post"]
# 年，月，日及时间的格式化样式
yearFormat: "2006"
monthFormat: "2006-01"
dateFormat: "2006-01-02"
timeFormat: "2006-01-02 15:04:05"

author: Yuntu.
description: "少女祈祷中..."
subtitle: "少女祈祷中..."

banner: "images/banner.webp"
# 你也可以写成以下形式
# banner: "https://example.com"

# 如果你想使用srcset属性，请启用它
banner_srcset:
  enable: true
  srcset:
    - src: "images/banner-600w.webp"
      media: "(max-width: 479px)"
    - src: "images/banner-800w.webp"
      media: "(max-width: 799px)"
    - src: "images/banner.webp"
      media: "(min-width: 800px)"

avatar: "avatar.webp"

# 控制文章封面显示
# 如果未设置，默认显示banner图片
# 它的优先级低于Front-matter中的封面
cover: # https://example.com / false / rgb(255,117,117)

# 控制文章目录显示
# 它的优先级低于Front-matter中的目录
toc: true

# Open Graph
open_graph:
  enable: true
  options:
    #twitter_card: <twitter:card>
    #twitter_id: <twitter:creator>
    #twitter_site: <twitter:site>
    #twitter_image: <twitter:image>
    #google_plus: <g+:profile_link>
    #fb_admins: <fb:admin_id>
    #fb_app_id: <fb:app_id>

# Content
excerpt_link: Read More

# 注入代码片段
# 确保你的代码片段是安全的HTML
injector:
  head_begin: # 在<head>后注入代码片段
  head_end: # 在</head>前注入代码片段
  body_begin: # 在<body>后注入代码片段
  body_end: # 在</body>前注入代码片段
  sidebar_begin: # 在<aside>后注入代码片段
  sidebar_end: # 在</aside>前注入代码片段

# 页脚版权
# 在页脚版权中注入代码片段
# 确保你的代码片段是安全的HTML
copyright:
# Need help choosing? Please see...
# https://creativecommons.org/choose/
# https://choosealicense.com/
# copyright: |-
#   <div style="flex-direction:column;align-items: center;"><a rel="license" href="http://creativecommons.org/licenses/by/4.0/"><img alt="Creative Commons License" style="border-width:0" src="https://i.creativecommons.org/l/by/4.0/88x31.png" /></a>
#   All website licensed under <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a></div>

footer:
  since: 2020 # 2020-current year
  powered: true
  count: true
  busuanzi: true
  icon:
    url: "../images/taichi.png" # 这个路径相对于css/main.css，所以需要向上移动一级到达images文件夹
    rotate: true
    mask: true # 是否使用图片作为遮罩

# 侧边栏
sidebar: right

social:
  # email: mailto:xxx@gmail.com
  # github: https://github.com/yourname
  # google: https://plus.google.com/yourname
  # twitter: https://twitter.com/yourname
  # facebook: https://www.facebook.com/yourname
  # instagram: https://www.instagram.com/yourname
  # linkedin: https://www.linkedin.com/in/yourname
  # pinterest: https://www.pinterest.com/yourname
  # youtube: https://www.youtube.com/channel/yourname
  # vimeo: https://vimeo.com/yourname
  # flickr: https://www.flickr.com/photos/yourname
  # dribbble: https://dribbble.com/yourname
  # behance: https://www.behance.net/yourname
  # bilibili: https://space.bilibili.com/yourname
  # weibo: https://weibo.com/yourname
  # zhihu: https://www.zhihu.com/people/yourname
  # reddit: https://www.reddit.com/user/yourname
  # tumblr: https://yourname.tumblr.com
  # medium: https://medium.com/@yourname
  # deviantart: https://yourname.deviantart.com
  # stackoverflow: https://stackoverflow.com/users/yourname
  # keybase: https://keybase.io/yourname
  # telegram: https://t.me/yourname
  # discord: https://discordapp.com/users/yourname
  # steam: https://steamcommunity.com/id/yourname

widgets:
  - category
  - tag
  - tagcloud
  - recent_posts

# 小部件行为
category_limits: 10
tag_limits: 10
recent_posts_limits: 5
tagcloud_limits: 20

# 归档行为
only_show_capsule_in_index: false # 如果你有大量的标签和分类，可以设置这个值为true，只在首页显示胶囊

########################################
# CSS
########################################

anchor_icon:  # 默认使用'#'图标，你可以使用fontawesome或icon_font的十六进制表示，如'f0c1'

reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/reimu-cursor-default.png  # 这个路径相对于css/main.css，所以需要向上移动一级到达images文件夹
    pointer: ../images/cursor/reimu-cursor-pointer.png
    text: ../images/cursor/reimu-cursor-text.png

icon_font: 4552607_0khxww3tj3q9

# https://fonts.google.com/
# Google Fonts，优先级高于local_font
font:
  article:
    - Mulish
    - Noto Serif SC
  code:
    # - Ubuntu Mono
    # - Source Code Pro
    # - JetBrains Mono

# 本地备用字体
local_font:
  article:
    - "-apple-system"
    - PingFang SC
    - Microsoft YaHei
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace

dark_mode:
  # true表示默认启用暗黑模式
  # false表示默认禁用暗黑模式
  # auto表示根据系统设置自动切换暗黑模式
  enable: auto # true | false | auto

########################################
# 分析
########################################

baidu_analytics: True     #
google_analytics: false
clarity: True             #

########################################
# Markdown 显示
########################################

code_block:
  # 是否默认展开代码块
  # true表示默认展开所有代码块
  # false表示默认折叠所有代码块
  # number表示默认折叠代码块，当行数超过指定值时
  expand: true

math:
  katex:
    enable: true
  mathjax:
    enable: false
    options: # 见https://docs.mathjax.org/en/latest/web/configuration.html
    # 我们需要将配置放在一个数组中，因为hugo会自动将键转换为小写
      [
        {
          tex:
            {
              tags: "ams",
              useLabelIds: true,
              inlineMath: [["$", "$"], ['\\(', '\\)']],
              displayMath: [["$$", "$$"], ['\\[', '\\]']],
              processEscapes: true,
              processEnvironments: true,
              autoload: { color: [], colorv2: ["color"] },
              packages: { "[+]": ["noerrors"] },
            },
          options:
            {
              skipHtmlTags:
                ["script", "noscript", "style", "textarea", "pre", "code"],
              ignoreHtmlClass: "tex2jax_ignore",
              processHtmlClass: "tex2jax_process",
            },
          loader: { load: ["input/asciimath", "[tex]/noerrors"] },
        },
      ]

########################################
# 评论系统
########################################

# 全局控制评论系统
# 你可以同时使用多个评论系统
# 加载顺序：localStorage(用户手动选择) -> 默认 -> valine -> waline -> twikoo -> gitalk -> giscus
comment:
  # 评论系统标题
  title: 说些什么吧！
  default: waline # 默认评论系统，当你启用多个评论系统时

# valine 评论系统。https://valine.js.org
# 版本 1.5.1
# notify 和 verify 已弃用
valine:
  enable: false # 如果你想使用valine，请设置这个值为true
  appId: # leancloud应用app id
  appKey: # leancloud应用app key
  pageSize: 10 # 评论列表页大小
  avatar: mp # gravatar样式 https://valine.js.org/#/avatar
  lang: zh-cn # i18n: zh-cn/en
  placeholder: Just go go # valine评论输入框占位符(like: Please leave your footprints )
  guest_info: nick,mail,link #valine评论头部信息
  recordIP: true # 是否记录评论者的IP地址
  highlight: true # 是否高亮代码块
  visitor: false # 是否显示访客数量

# https://waline.js.org/
waline:
  enable: false
  serverURL:
  lang: zh-CN
  locale: {} # https://waline.js.org/guide/features/i18n.html#%E8%87%AA%E5%AE%9A%E4%B9%89%E8%AF%AD%E8%A8%80
  emoji:
    - https://unpkg.com/@waline/emojis@1.2.0/weibo
    - https://unpkg.com/@waline/emojis@1.2.0/alus
    - https://unpkg.com/@waline/emojis@1.2.0/bilibili
    - https://unpkg.com/@waline/emojis@1.2.0/qq
    - https://unpkg.com/@waline/emojis@1.2.0/tieba
    - https://unpkg.com/@waline/emojis@1.2.0/tw-emoji
  meta:
    - nick
    - mail
    - link
  requiredMeta:
    - nick
    - mail
  wordLimit: 0
  pageSize: 10
  pageview: true

# https://twikoo.js.org
twikoo:
  enable: false
  envId: # 腾讯云环境填 envId；Vercel 环境填地址（https://xxx.vercel.app）
  region:

# https://github.com/gitalk/gitalk/blob/master/readme-cn.md
gitalk:
  enable: false
  clientID:
  clientSecret:
  repo:
  owner:
  admin:
  md5: false

# https://giscus.app/zh-CN
giscus:
  enable: false
  repo:
  repoId:
  category:
  categoryId:
  mapping: mapping
  strict: 0
  reactionsEnabled: 1
  emitMetadata: 0
  inputPosition: bottom
  # commentTheme: preferred_color_scheme invalid
  lang: zh-CN

########################################
# Search
########################################

algolia_search:
  enable: false
  appID:
  apiKey:
  indexName:
  hits:
    per_page: 10
  labels:
    input_placeholder: "搜索....."
    hits_empty: "未发现与 「${query}」相关内容"
    hits_stats: "找到${hits}条结果（用时 ${time} ms）"

########################################
# 动画
########################################

preloader:
  enable: true
  text: 努力加载中...
  icon: # 默认使用内联svg，你可以使用图片url，如'/images/taichi.png'

# 见https://github.com/D-Sketon/aos.js
animation:
  enable: false
  options:
    header:
      title: slide-up
      subTitle: slide-down
    home:
      post: fade-up
      widget: fade-up
      sidebar: fade-up
    article:
      whole: fade-up
      date: zoom-in
      category: zoom-in
      tag: zoom-in
      comment: zoom-in
      reading: zoom-in
      nav: fade-up
    archive:
      whole: fade-up
      tag: zoom-in
      category: zoom-in
      section: fade-up
      nav: fade-up

# see https://github.com/D-Sketon/mouse-firework
firework:
  enable: true
  options:
    excludeElements: ["a", "button"]
    particles:
      - shape: circle
        move: ["emit"]
        easing: easeOutExpo
        colors: ["var(--red-1)", "var(--red-2)", "var(--red-3)", "var(--red-4)"]
        number: 20
        duration: [1200, 1800]
        shapeOptions:
          radius: [16, 32]
          alpha: [0.3, 0.5]
      - shape: circle
        move: ["diffuse"]
        easing: easeOutExpo
        colors: ["var(--red-0)"]
        number: 1
        duration: [1200, 1800]
        shapeOptions:
          radius: 20
          alpha: [0.2, 0.5]
          lineWidth: 6

########################################
# 扩展功能
########################################

# 在每篇文章下方显示版权
article_copyright:
  enable: false
  content:
    author: true
    link: true
    title: false
    date: false
    updated: false
    license: true

# 剪贴板配置
clipboard:
  success: 复制成功(*^▽^*)
  fail: 复制失败 (ﾟ⊿ﾟ)ﾂ
  copyright:
    enable: false
    count: 50 # The number of characters when the copyright is displayed
    content: 本文版权：本博客所有文章除特别声明外，均采用 BY-NC-SA 许可协议。转载请注明出处！

# 返回顶部
top:
  enable: true
  position: right # left or right
  icon:
    url: "../images/taichi.png" # 这个路径相对于css/main.css，所以需要向上移动一级到达images文件夹
    rotate: true
    mask: true # 是否使用图片作为遮罩

# 是否显示文章过期通知
outdate:
  enable: false
  daysAgo: 180 # 文章过期天数
  message: 本文最后更新于 {time}，请注意文中内容可能已经发生变化。

# ICP 备案
icp:
  icpnumber: # ICP备案号
  beian: # 网安备案号
  recordcode: # 网安备案链接中的recordcode参数

# Sponsor
sponsor:
  enable: true
  tip: 请作者喝杯咖啡吧！
  icon:
    url: "../images/taichi.png" # 这个路径相对于css/main.css，所以需要向上移动一级到达images文件夹
    rotate: true
    mask: true # 是否使用图片作为遮罩
  qr:
    # - name: 支付宝
    #   src: "sponsor/alipay.jpg"
    - name: 微信
      src: "sponsor/wechat.png"

# Share
share:
  # - facebook
  # - twitter
  # - linkedin
  # - reddit
  # - weibo
  - qq
  - weixin

# 在首页显示分类卡片
home_categories:
  enable: true
  content:
    - categories: # 字符串（单层分类）或数组（多层分类）
      cover: # 空表示随机封面
    - categories:
      cover:

########################################
# 实验性功能
########################################

# 实验性功能，可能有很多bug，请谨慎开启！
pjax:
  enable: true

# 实验性功能
# https://github.com/GoogleChromeLabs/quicklink
quicklink:
  enable: true
  # `requestIdleCallback`超时时间，单位为毫秒
  timeout: 3000
  # 是否将options.el容器中的URL视为高优先级
  # 当为true时，quicklink将尝试使用fetch() API（而不是link[rel=prefetch]）
  priority: true
  # 确定是否应该预取URL
  # 只支持字符串
  ignores: []

# 实验性功能
service_worker:
  enable: false

# 实验性功能
live2d:
  enable: false
  position: left # left or right

# 实验性功能
live2d_widgets:
  enable: false
  position: left # left or right

# https://github.com/CodeByZach/pace
pace:
  enable: true

# 实验性功能
# 请开启pjax以使用此功能
player:
  # 如果你启用meting，你必须先启用aplayer
  aplayer:
    # https://github.com/DIYgod/APlayer
    enable: true
    options:
      audio: []
      fixed: true
      autoplay:
      loop:
      order:
      preload:
      volume:
      mutex:
      listFolded:
      lrcType:
  meting:
    # https://github.com/metowolf/MetingJS
    # 如果你想使用meting，请先启用aplayer
    enable: true
    meting_api:  # 自定义api
    options:
      id: 2265921590
      server: netease
      type: playlist
      auto:
      mini: true

########################################
# pangu.js
########################################

pangu:
  # 更多信息：https://github.com/vinta/pangu.js 
  enable: false  # 启用pangu.js以在中文和英文之间添加空格

########################################
# Material Theme
########################################

# 实验性功能，可能有很多bug，请谨慎开启！
# 基于Google的Material You设计指南的动态颜色生成工具，能够从任何图像中提取主色并生成完整的亮色和暗色配色方案。
material_theme:
  # 更多信息：https://github.com/2061360308/material-theme
  # 注意：当你启用此功能时，所有封面都会自动添加"crossorigin"属性以支持动态颜色方案
  # 所以请确保你的自定义封面不会被浏览器的CORS策略阻止
  enable: false # 启用material_theme以基于banner图片生成动态配色方案